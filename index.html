<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
 
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: transparent;
}
 
/* ─── トリガーボタン ─── */
#chat-trigger {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #111;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.22);
  transition: transform .2s, box-shadow .2s;
  z-index: 9999;
}
#chat-trigger:hover { transform: scale(1.07); box-shadow: 0 6px 28px rgba(0,0,0,0.28); }
#chat-trigger .ic { transition: opacity .2s, transform .25s; }
#chat-trigger .ic-close { position: absolute; opacity: 0; transform: rotate(-80deg) scale(.7); }
#chat-trigger.open .ic-chat  { opacity: 0; transform: rotate(80deg) scale(.7); }
#chat-trigger.open .ic-close { opacity: 1; transform: rotate(0deg) scale(1); }
 
/* バッジ */
#badge {
  position: fixed; bottom: 68px; right: 20px;
  background: #e74c3c; color: #fff;
  border-radius: 50%; width: 18px; height: 18px;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  z-index: 10000; transition: opacity .2s, transform .2s;
}
#badge.hidden { opacity: 0; transform: scale(.5); pointer-events: none; }
 
/* ─── チャットウィンドウ ─── */
#chat-window {
  position: fixed;
  bottom: 92px; right: 24px;
  width: 340px;
  display: flex; flex-direction: column;
  background: #fff;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 8px 48px rgba(0,0,0,0.16);
  transform: translateY(12px) scale(.97);
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s;
  z-index: 9998;
  max-height: 580px;
}
#chat-window.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }
 
/* ヘッダー */
.ch {
  background: #111; color: #fff;
  padding: 16px 18px 13px;
  flex-shrink: 0;
}
.ch-top { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
.av {
  width: 34px; height: 34px; border-radius: 50%;
  background: #f5f0e8;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.ch h2 { font-size: 14px; font-weight: 700; }
.ch p  { font-size: 11px; color: rgba(255,255,255,.5); margin-left: 44px; }
.dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: #4ade80;
  margin-right: 5px; vertical-align: middle;
}
 
/* メッセージ */
#msgs {
  flex: 1; overflow-y: auto;
  padding: 14px 13px;
  display: flex; flex-direction: column; gap: 9px;
  background: #faf9f6;
  scroll-behavior: smooth;
}
#msgs::-webkit-scrollbar { width: 3px; }
#msgs::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
 
.msg {
  max-width: 84%;
  font-size: 13px; line-height: 1.6;
  padding: 9px 13px;
  border-radius: 14px;
  animation: fadeUp .2s ease both;
  white-space: pre-wrap; word-break: break-word;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg.bot  { background: #fff; color: #111; border: 1px solid #ece8e0; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.user { background: #111; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
 
/* タイピング */
.typing { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
.typing span {
  width: 6px; height: 6px; border-radius: 50%; background: #bbb;
  animation: bounce 1.1s infinite;
}
.typing span:nth-child(2) { animation-delay: .18s; }
.typing span:nth-child(3) { animation-delay: .36s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}
 
/* クイック返信 */
#qr { background: #faf9f6; flex-shrink: 0; }
.qr-wrap {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 4px 13px 12px;
  animation: fadeUp .22s ease both;
}
.qr-btn {
  background: #fff; border: 1px solid #111; color: #111;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px; padding: 5px 13px;
  border-radius: 20px; cursor: pointer;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.qr-btn:hover { background: #111; color: #fff; }
 
/* 入力エリア */
.cin {
  display: flex; gap: 8px; align-items: flex-end;
  padding: 10px 12px;
  border-top: 1px solid #ece8e0;
  background: #fff; flex-shrink: 0;
}
#inp {
  flex: 1;
  border: 1px solid #ddd; border-radius: 18px;
  padding: 8px 13px;
  font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
  outline: none; background: #faf9f6;
  transition: border-color .15s;
  resize: none; line-height: 1.5;
  max-height: 80px; overflow-y: auto;
}
#inp:focus { border-color: #111; }
#inp::placeholder { color: #bbb; }
#inp:disabled { opacity: .5; }
 
#snd {
  width: 36px; height: 36px; border-radius: 50%;
  background: #111; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity .15s, transform .15s;
}
#snd:hover:not(:disabled) { opacity: .75; transform: scale(1.06); }
#snd:disabled { opacity: .3; cursor: default; transform: none; }
 
/* 確認カード */
.confirm-card {
  background: #f5f0e8;
  border-radius: 10px;
  padding: 10px 13px;
  font-size: 12px; line-height: 1.8;
  color: #333;
  max-width: 90%;
  align-self: flex-start;
  animation: fadeUp .2s ease both;
}
.confirm-card strong { font-weight: 700; color: #111; }
 
/* ヒント */
.hint {
  font-size: 11px; color: #aaa;
  text-align: right;
  padding: 2px 14px 6px;
  background: #fff;
}
</style>
</head>
<body>
 
<div id="badge">1</div>
 
<button id="chat-trigger" aria-label="チャットを開く">
  <svg class="ic ic-chat" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg class="ic ic-close" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>
 
<div id="chat-window" role="dialog" aria-label="お問い合わせチャット">
  <div class="ch">
    <div class="ch-top">
      <div class="av">💬</div>
      <h2>コエルワ お問い合わせ</h2>
    </div>
    <p><span class="dot"></span>通常、数時間以内にメールでご返信します</p>
  </div>
  <div id="msgs"></div>
  <div id="qr"></div>
  <div class="hint" id="hint" style="display:none">Shift+Enter で改行 ／ 送信ボタンで送信</div>
  <div class="cin">
    <textarea id="inp" placeholder="メッセージを入力..." maxlength="1000" autocomplete="off" disabled rows="1"></textarea>
    <button id="snd" aria-label="送信" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>
 
<script>
// ============================================================
//  ⚙️  設定
// ============================================================
const CFG = {
  WEBHOOK:     'https://fancy-snowflake-ffe9.coeruwa-all.workers.dev',
  REPLY_EMAIL: 'contact@coeruwa.com',
  BOT_NAME:    'コエルワ お問い合わせ',
 
  // 取り組み選択肢
  TOPICS: [
    '長期休暇事業（まなび場事業など）',
    '出前授業の実施（探究プログラムなど）',
    'コエルワのことを知りたい',
  ],
 
  // 所属選択肢
  AFFILIATIONS: ['教育委員会', '自治体', '学校', '民間企業'],
 
  // 知った媒体
  MEDIA: [
    '公式SNS（Instagram / X / note）',
    '先端教育',
    'PR TIMES',
    '北海道新聞',
    'その他',
  ],
};
// ============================================================
 
const msgsEl = document.getElementById('msgs');
const qrEl   = document.getElementById('qr');
const inp    = document.getElementById('inp');
const snd    = document.getElementById('snd');
const trigger= document.getElementById('chat-trigger');
const win    = document.getElementById('chat-window');
const badge  = document.getElementById('badge');
const hint   = document.getElementById('hint');
 
let isOpen = false, started = false;
// step: 0=top, 1=name, 2=email, 3=affiliation, 4=role, 5=media, 6=media_other, 7=question, 8=confirm, 9=done
let step = 0;
let user = {};
 
// ─── 開閉 ───
trigger.addEventListener('click', () => {
  isOpen = !isOpen;
  win.classList.toggle('open', isOpen);
  trigger.classList.toggle('open', isOpen);
  badge.classList.add('hidden');
  if (isOpen && !started) { started = true; setTimeout(boot, 350); }
  if (isOpen) inp.focus();
});
 
// ─── 入力 ───
inp.addEventListener('input', () => {
  snd.disabled = !inp.value.trim();
  // 高さ自動調整
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 80) + 'px';
});
 
// IME変換中フラグ
let isComposing = false;
inp.addEventListener('compositionstart', () => { isComposing = true; });
inp.addEventListener('compositionend', () => { isComposing = false; });
 
// Enterで送信、Shift+Enterで改行（IME変換中は送信しない）
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !isComposing) {
    e.preventDefault();
    if (!snd.disabled) send();
  }
});
snd.addEventListener('click', send);
 
// ─── ユーティリティ ───
const wait = ms => new Promise(r => setTimeout(r, ms));
 
function addMsg(text, type = 'bot') {
  const el = document.createElement('div');
  el.className = `msg ${type}`;
  el.textContent = text;
  msgsEl.appendChild(el);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return el;
}
 
function addConfirmCard(u) {
  const el = document.createElement('div');
  el.className = 'confirm-card';
  el.innerHTML = `
    <strong>ご興味の取り組み：</strong>${u.topic}<br>
    <strong>お名前：</strong>${u.name}<br>
    <strong>メール：</strong>${u.email}<br>
    <strong>所属・役職：</strong>${u.affiliation}<br>
    <strong>知った媒体：</strong>${u.media}<br>
    ${u.question ? `<strong>ご質問・ご要望：</strong>${u.question}` : ''}
  `;
  msgsEl.appendChild(el);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
 
function typing() {
  const el = document.createElement('div');
  el.className = 'msg bot'; el.id = 'typ';
  el.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  msgsEl.appendChild(el);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function rmTyping() { document.getElementById('typ')?.remove(); }
 
function showQR(opts) {
  qrEl.innerHTML = '';
  if (!opts.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'qr-wrap';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'qr-btn'; b.textContent = o;
    b.onclick = () => { wrap.remove(); onChoice(o); };
    wrap.appendChild(b);
  });
  qrEl.appendChild(wrap);
}
 
function enableInput(placeholder = 'メッセージを入力...') {
  inp.disabled = false;
  inp.placeholder = placeholder;
  inp.style.height = 'auto';
  hint.style.display = 'block';
  inp.focus();
}
function disableInput() {
  inp.disabled = true;
  snd.disabled = true;
  hint.style.display = 'none';
}
 
function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
 
// ─── 起動 ───
async function boot() {
  typing(); await wait(700); rmTyping();
  addMsg('こんにちは！コエルワへのご関心ありがとうございます 😊');
  await wait(500);
  typing(); await wait(600); rmTyping();
  addMsg('ご興味のある取り組みを選んでください。');
  showQR(CFG.TOPICS);
}
 
// ─── クイック返信の選択 ───
async function onChoice(choice) {
  addMsg(choice, 'user');
 
  // 取り組み選択
  if (CFG.TOPICS.includes(choice)) {
    user.topic = choice;
    step = 1;
    typing(); await wait(700); rmTyping();
    addMsg(`「${choice}」についてのお問い合わせですね。\n資料をお送りするために、いくつかご入力をお願いします。`);
    await wait(400);
    addMsg('まず、お名前を教えてください。');
    enableInput('例：山田 太郎');
    return;
  }
 
 
 
  // 知った媒体選択
  if (CFG.MEDIA.includes(choice)) {
    if (choice === 'その他') {
      user.media = '';
      step = 6;
      typing(); await wait(500); rmTyping();
      addMsg('どちらでお知りになりましたか？');
      enableInput('媒体名を入力してください');
    } else {
      user.media = choice;
      step = 7;
      typing(); await wait(600); rmTyping();
      addMsg('ご質問やご要望があればご入力ください。（任意）\n特になければ「スキップ」を押してください。');
      enableInput('例：詳しい料金や導入事例が知りたいです');
      showQR(['スキップ']);
    }
    return;
  }
 
  // スキップ
  if (choice === 'スキップ') {
    user.question = '';
    step = 8;
    disableInput();
    typing(); await wait(700); rmTyping();
    addMsg('以下の内容で送信してよろしいですか？');
    await wait(200);
    addConfirmCard(user);
    showQR(['送信する', '修正する']);
    return;
  }
 
  // 送信・修正
  if (choice === '送信する') { await submit(); return; }
  if (choice === '修正する') {
    step = 0; user = {};
    typing(); await wait(500); rmTyping();
    addMsg('承知しました。最初からやり直します。');
    await wait(300);
    addMsg('ご興味のある取り組みを選んでください。');
    showQR(CFG.TOPICS);
    return;
  }
}
 
// ─── テキスト送信 ───
async function send() {
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = 'auto';
  snd.disabled = true;
  addMsg(text, 'user');
 
  // step1: 名前
  if (step === 1) {
    user.name = text; step = 2;
    typing(); await wait(700); rmTyping();
    addMsg(`${user.name}さん、ありがとうございます。`);
    await wait(200);
    addMsg('返信先のメールアドレスを教えてください。');
    enableInput('例：taro@example.com');
    return;
  }
 
  // step2: メール
  if (step === 2) {
    if (!isEmail(text)) {
      addMsg('メールアドレスの形式が正しくないようです。もう一度ご入力ください。');
      enableInput('例：taro@example.com');
      return;
    }
    user.email = text; step = 3;
    typing(); await wait(700); rmTyping();
    addMsg('ありがとうございます。所属と役職を教えてください。');
    enableInput('例：〇〇市教育委員会 指導主事');
    return;
  }
 
  // step3: 所属・役職
  if (step === 3) {
    user.affiliation = text; step = 5;
    disableInput();
    typing(); await wait(600); rmTyping();
    addMsg('コエルワのことをどこでお知りになりましたか？');
    showQR(CFG.MEDIA);
    return;
  }
 
  // step6: 媒体その他
  if (step === 6) {
    user.media = text; step = 7;
    typing(); await wait(600); rmTyping();
    addMsg('ご質問やご要望があればご入力ください。（任意）\n特になければ「スキップ」を押してください。');
    enableInput('例：詳しい料金や導入事例が知りたいです');
    showQR(['スキップ']);
    return;
  }
 
  // step7: 質問・要望
  if (step === 7) {
    user.question = text; step = 8;
    disableInput();
    typing(); await wait(700); rmTyping();
    addMsg('以下の内容で送信してよろしいですか？');
    await wait(200);
    addConfirmCard(user);
    showQR(['送信する', '修正する']);
    return;
  }
}
 
// ─── 送信 ───
async function submit() {
  step = 9; disableInput();
  typing(); await wait(600);
 
  const now = new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
 
  const payload = {
    username: CFG.BOT_NAME,
    icon_emoji: ':mailbox_with_mail:',
    blocks: [
      {
        type: 'header',
        text: { type: 'plain_text', text: '📬 新しいお問い合わせが届きました', emoji: true }
      },
      { type: 'divider' },
      {
        type: 'section',
        fields: [
          { type: 'mrkdwn', text: `*お名前*\n${user.name}` },
          { type: 'mrkdwn', text: `*メールアドレス*\n<mailto:${user.email}|${user.email}>` },
        ]
      },
    {
  type: 'section',
  fields: [
    { type: 'mrkdwn', text: `*お名前*\n${user.name}` },
    { type: 'mrkdwn', text: `*メールアドレス*\n<mailto:${user.email}|${user.email}>` },
  ]
},
{
  type: 'section',
  fields: [
    { type: 'mrkdwn', text: `*ご興味の取り組み*\n${user.topic}` },
    { type: 'mrkdwn', text: `*所属・役職*\n${user.affiliation}` },
  ]
},
{
  type: 'section',
  fields: [
    { type: 'mrkdwn', text: `*知った媒体*\n${user.media}` },
    { type: 'mrkdwn', text: `*ご質問・ご要望*\n${user.question || 'なし'}` },
  ]
},
      { type: 'divider' },
      {
        type: 'context',
        elements: [
          {
            type: 'mrkdwn',
            text: `📧 *返信先：* <mailto:${user.email}|${user.email}>　｜　受信日時: ${now}`
          }
        ]
      }
    ]
  };
 
  try {
    await fetch(CFG.WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    rmTyping();
    addMsg('送信しました！担当者よりメールにてご連絡します 📨');
    await wait(400);
    addMsg(`返信先：${user.email}\n通常、数時間〜1営業日以内にご連絡します。`);
  } catch (e) {
    rmTyping();
    addMsg('送信中にエラーが発生しました。お手数ですが ' + CFG.REPLY_EMAIL + ' までご連絡ください。');
    console.error('Webhook error:', e);
  }
}
</script>
</body>
</html>
