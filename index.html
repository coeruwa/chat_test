<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: transparent;
}

/* ─── トリガーボタン ─── */
#chat-trigger {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #111;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.22);
  transition: transform .2s, box-shadow .2s;
  z-index: 9999;
}
#chat-trigger:hover { transform: scale(1.07); box-shadow: 0 6px 28px rgba(0,0,0,0.28); }
#chat-trigger .ic { transition: opacity .2s, transform .25s; }
#chat-trigger .ic-close { position: absolute; opacity: 0; transform: rotate(-80deg) scale(.7); }
#chat-trigger.open .ic-chat  { opacity: 0; transform: rotate(80deg) scale(.7); }
#chat-trigger.open .ic-close { opacity: 1; transform: rotate(0deg) scale(1); }

/* バッジ */
#badge {
  position: fixed; bottom: 68px; right: 20px;
  background: #e74c3c; color: #fff;
  border-radius: 50%; width: 18px; height: 18px;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  z-index: 10000; transition: opacity .2s, transform .2s;
}
#badge.hidden { opacity: 0; transform: scale(.5); pointer-events: none; }

/* ─── チャットウィンドウ ─── */
#chat-window {
  position: fixed;
  bottom: 92px; right: 24px;
  width: 340px;
  display: flex; flex-direction: column;
  background: #fff;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 8px 48px rgba(0,0,0,0.16);
  transform: translateY(12px) scale(.97);
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s;
  z-index: 9998;
  max-height: 580px;
}
#chat-window.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }

/* ヘッダー */
.ch {
  background: #111; color: #fff;
  padding: 16px 18px 13px;
  flex-shrink: 0;
}
.ch-top { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
.av {
  width: 34px; height: 34px; border-radius: 50%;
  background: #f5f0e8;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.ch h2 { font-size: 14px; font-weight: 700; }
.ch p  { font-size: 11px; color: rgba(255,255,255,.5); margin-left: 44px; }
.dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: #4ade80;
  margin-right: 5px; vertical-align: middle;
}

/* メッセージ */
#msgs {
  flex: 1; overflow-y: auto;
  padding: 14px 13px;
  display: flex; flex-direction: column; gap: 9px;
  background: #faf9f6;
  scroll-behavior: smooth;
}
#msgs::-webkit-scrollbar { width: 3px; }
#msgs::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

.msg {
  max-width: 84%;
  font-size: 13px; line-height: 1.6;
  padding: 9px 13px;
  border-radius: 14px;
  animation: fadeUp .2s ease both;
  white-space: pre-wrap; word-break: break-word;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg.bot  { background: #fff; color: #111; border: 1px solid #ece8e0; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.user { background: #111; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }

/* タイピング */
.typing { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
.typing span {
  width: 6px; height: 6px; border-radius: 50%; background: #bbb;
  animation: bounce 1.1s infinite;
}
.typing span:nth-child(2) { animation-delay: .18s; }
.typing span:nth-child(3) { animation-delay: .36s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

/* クイック返信 */
#qr { background: #faf9f6; flex-shrink: 0; }
.qr-wrap {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 4px 13px 12px;
  animation: fadeUp .22s ease both;
}
.qr-btn {
  background: #fff; border: 1px solid #111; color: #111;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px; padding: 5px 13px;
  border-radius: 20px; cursor: pointer;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.qr-btn:hover { background: #111; color: #fff; }

/* 事業ページカード */
.page-card {
  background: #fff;
  border: 1px solid #ece8e0;
  border-radius: 12px;
  padding: 10px 13px;
  font-size: 12px;
  color: #111;
  max-width: 90%;
  align-self: flex-start;
  animation: fadeUp .2s ease both;
  text-decoration: none;
  display: block;
  transition: background .15s;
}
.page-card:hover { background: #f5f0e8; }
.page-card .card-label { font-size: 10px; color: #888; margin-bottom: 3px; }
.page-card .card-title { font-weight: 700; font-size: 13px; }
.page-card .card-arrow { color: #888; font-size: 11px; margin-top: 3px; }

/* 入力エリア */
.cin {
  display: flex; gap: 8px; align-items: flex-end;
  padding: 10px 12px;
  border-top: 1px solid #ece8e0;
  background: #fff; flex-shrink: 0;
}
#inp {
  flex: 1;
  border: 1px solid #ddd; border-radius: 18px;
  padding: 8px 13px;
  font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
  outline: none; background: #faf9f6;
  transition: border-color .15s;
  resize: none; line-height: 1.5;
  max-height: 80px; overflow-y: auto;
}
#inp:focus { border-color: #111; }
#inp::placeholder { color: #bbb; }
#inp:disabled { opacity: .5; }

#snd {
  width: 36px; height: 36px; border-radius: 50%;
  background: #111; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity .15s, transform .15s;
}
#snd:hover:not(:disabled) { opacity: .75; transform: scale(1.06); }
#snd:disabled { opacity: .3; cursor: default; transform: none; }

/* ヒント */
.hint {
  font-size: 11px; color: #aaa;
  text-align: right;
  padding: 2px 14px 6px;
  background: #fff;
}
</style>
</head>
<body>

<div id="badge">1</div>

<button id="chat-trigger" aria-label="チャットを開く">
  <svg class="ic ic-chat" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg class="ic ic-close" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<div id="chat-window" role="dialog" aria-label="お問い合わせチャット">
  <div class="ch">
    <div class="ch-top">
      <div class="av">💬</div>
      <h2>コエルワ お問い合わせ</h2>
    </div>
    <p><span class="dot"></span>通常、数時間以内にメールでご返信します</p>
  </div>
  <div id="msgs"></div>
  <div id="qr"></div>
  <div class="hint" id="hint" style="display:none">Shift+Enter で改行 ／ 送信ボタンで送信</div>
  <div class="cin">
    <textarea id="inp" placeholder="メッセージを入力..." maxlength="1000" autocomplete="off" disabled rows="1"></textarea>
    <button id="snd" aria-label="送信" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ============================================================
//  ⚙️  設定
// ============================================================
const CFG = {
  WEBHOOK:  'https://fancy-snowflake-ffe9.coeruwa-all.workers.dev',
  BOT_NAME: 'コエルワ お問い合わせ',
  HP_URL:   'https://coeruwa.com',

  // Q1 所属種類
  AFFILIATION_TYPES: ['企業・団体', '自治体・教育委員会', '学校'],

  // Q4 ルートA 事業選択（所属別） ※事業名・URLは後日コエルワ側で差し替え
  BUSINESSES: {
    '企業・団体': [
      { name: '【事業名A】企業×地域連携プログラム', url: 'https://coeruwa.com/' },
      { name: '【事業名B】企業研修・人材育成',       url: 'https://coeruwa.com/' },
      { name: 'その他',                              url: null },
    ],
    '自治体・教育委員会': [
      { name: '【事業名C】まなび場（放課後・長期休暇支援）', url: 'https://coeruwa.com/' },
      { name: '【事業名D】ミラスキ（探究・起業家教育）',     url: 'https://coeruwa.com/' },
      { name: 'その他',                                      url: null },
    ],
    '学校': [
      { name: '【事業名E】探究・キャリア授業プログラム', url: 'https://coeruwa.com/' },
      { name: '【事業名F】プログラミング授業',           url: 'https://coeruwa.com/' },
      { name: 'その他',                                  url: null },
    ],
  },

  // Q4 ルートB 課題選択（所属別）
  ISSUES: {
    '企業・団体': [
      '地域や教育との接点をつくりたいが方法がわからない',
      '社員の研修・人材育成を充実させたい',
      'その他',
    ],
    '自治体・教育委員会': [
      '放課後や長期休暇中の子どもの居場所をつくりたい',
      '地域の教育環境を改善したいが人手・ノウハウが足りない',
      '企業や外部との連携を強化したい',
      'その他',
    ],
    '学校': [
      '探究・キャリア教育の授業をどう設計すればいいかわからない',
      '外部の専門家・企業と連携した授業をやってみたい',
      'プログラミング教育を導入したいが教員だけでは難しい',
      'その他',
    ],
  },

  // Q5 検討状況
  STAGES: [
    'まだ情報収集の段階です',
    '具体的に検討を始めています',
    '導入・実施に向けて動き出したい',
  ],

  // Q6 今後のご希望
  HOPES: [
    '事業に関する資料を送っていただきたい',
    '担当者からお話を聞いてみたい',
    '両方希望します',
    '特に希望はありません',
  ],
};
// ============================================================

const msgsEl = document.getElementById('msgs');
const qrEl   = document.getElementById('qr');
const inp    = document.getElementById('inp');
const snd    = document.getElementById('snd');
const trigger= document.getElementById('chat-trigger');
const win    = document.getElementById('chat-window');
const badge  = document.getElementById('badge');
const hint   = document.getElementById('hint');

let isOpen = false, started = false;

// ステップ定義
// 'q1' → 'q2' → 'q3' → ルートA/B/C分岐
// ルートA: 'rA_q4' → 'rA_card' → 'rA_q5' → 'rA_q6' → 'rA_q7'(希望ありの場合) → 'done'
// ルートB: 'rB_q4' → 'rB_free' → 'rB_card' → 'rA_q5' → 'rA_q6' → 'rA_q7'(希望ありの場合) → 'done'
// ルートC: 'rC_intro' → 'rC_reselect' → ルートA/BへorD→'done'
let step = 'q1';
let user = { sessionId: crypto.randomUUID() };

// ─── 開閉 ───
trigger.addEventListener('click', () => {
  isOpen = !isOpen;
  win.classList.toggle('open', isOpen);
  trigger.classList.toggle('open', isOpen);
  badge.classList.add('hidden');
  if (isOpen && !started) { started = true; setTimeout(boot, 350); }
  if (isOpen) inp.focus();
});

// ─── 入力 ───
inp.addEventListener('input', () => {
  snd.disabled = !inp.value.trim();
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 80) + 'px';
});

let isComposing = false;
inp.addEventListener('compositionstart', () => { isComposing = true; });
inp.addEventListener('compositionend',   () => { isComposing = false; });

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !isComposing) {
    e.preventDefault();
    if (!snd.disabled) send();
  }
});
snd.addEventListener('click', send);

// ─── ユーティリティ ───
const wait = ms => new Promise(r => setTimeout(r, ms));

function addMsg(text, type = 'bot') {
  const el = document.createElement('div');
  el.className = `msg ${type}`;
  el.textContent = text;
  msgsEl.appendChild(el);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return el;
}

function addPageCard(business) {
  const el = document.createElement('a');
  el.className = 'page-card';
  el.href = business.url || CFG.HP_URL;
  el.target = '_blank';
  el.rel = 'noopener noreferrer';
  el.innerHTML = `
    <div class="card-label">📄 詳細ページ</div>
    <div class="card-title">${business.name}</div>
    <div class="card-arrow">詳しく見る →</div>
  `;
  msgsEl.appendChild(el);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function typing() {
  const el = document.createElement('div');
  el.className = 'msg bot'; el.id = 'typ';
  el.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  msgsEl.appendChild(el);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function rmTyping() { document.getElementById('typ')?.remove(); }

function showQR(opts) {
  qrEl.innerHTML = '';
  if (!opts.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'qr-wrap';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'qr-btn'; b.textContent = o;
    b.onclick = () => { wrap.remove(); onChoice(o); };
    wrap.appendChild(b);
  });
  qrEl.appendChild(wrap);
}

function enableInput(placeholder = 'メッセージを入力...') {
  inp.disabled = false;
  inp.placeholder = placeholder;
  inp.style.height = 'auto';
  hint.style.display = 'block';
  inp.focus();
}
function disableInput() {
  inp.disabled = true;
  snd.disabled = true;
  hint.style.display = 'none';
}

function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

// ユーザーの名前を取得（Q2入力から最初の単語を名前として使う）
function getFirstName() {
  if (!user.nameAffil) return 'あなた';
  // 「〇〇市教育委員会 山田太郎」→ スペースで分割して後半、なければ全体
  const parts = user.nameAffil.trim().split(/[\s　]+/);
  return parts.length >= 2 ? parts[parts.length - 1] : parts[0];
}

// ─── 通知・記録（各ステップ完了時）───
// notifySlack → Slack通知 + GAS記録
// recordOnly  → GAS記録のみ（Slack通知なし）
async function notifySlack(label, extra = {}) { await _send(label, extra, true); }
async function recordOnly(label, extra = {})  { await _send(label, extra, false); }
async function _send(label, extra, notifyToSlack) {
  const payload = {
    sessionId:       user.sessionId,
    label,
    notifyToSlack,
    affiliationType: user.affiliationType || '',
    nameAffil:       user.nameAffil       || '',
    route:           user.route           || '',
    business:        extra.business       || '',
    issue:           extra.issue          || '',
    freeword:        extra.freeword       || '',
    stage:           extra.stage          || '',
    hope:            extra.hope           || '',
    email:           extra.email          || '',
  };
  try {
    await fetch(CFG.WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  } catch (e) { console.error('通知エラー:', e); }
}

// ─── 起動 ───
async function boot() {
  typing(); await wait(800); rmTyping();
  addMsg('コエルワの公式サイトにお越しいただきありがとうございます。\nこのチャットでは、コエルワへのお問い合わせをサポートいたします。いくつかご質問させていただきますので、よろしければお付き合いください。');
  await wait(600);
  typing(); await wait(700); rmTyping();
  addMsg('はじめに、ご所属の種類を教えていただけますか？');
  showQR(CFG.AFFILIATION_TYPES);
  step = 'q1';
}

// ─── ボタン選択ハンドラ ───
async function onChoice(choice) {
  addMsg(choice, 'user');

  // ── Q1: 所属種類 ──
  if (step === 'q1') {
    user.affiliationType = choice;
    step = 'q2';
    recordOnly('Q1完了（所属種類）');
    typing(); await wait(600); rmTyping();
    addMsg('ありがとうございます。続いて具体的なご所属先の名称と氏名を教えてください。\n（例：〇〇市教育委員会 山田太郎）');
    enableInput('所属先名称と氏名を入力してください');
    return;
  }

  // ── Q3: 関心度 ──
  if (step === 'q3') {
    const name = getFirstName();
    if (choice.startsWith('A.')) {
      user.route = 'A';
      step = 'rA_q4';
      recordOnly('Q3完了（ルートA選択）');
      typing(); await wait(700); rmTyping();
      addMsg('ありがとうございます。気になっている事業・プログラムを教えていただけますか？');
      const bizNames = CFG.BUSINESSES[user.affiliationType]?.map(b => b.name) || ['その他'];
      showQR(bizNames);
    } else if (choice.startsWith('B.')) {
      user.route = 'B';
      step = 'rB_q4';
      recordOnly('Q3完了（ルートB選択）');
      typing(); await wait(700); rmTyping();
      addMsg('ありがとうございます。コエルワとの連携を考えるにあたって、現在どのようなことをお考えでしょうか？');
      const issues = CFG.ISSUES[user.affiliationType] || ['その他'];
      showQR(issues);
    } else if (choice.startsWith('C.')) {
      user.route = 'C';
      step = 'rC_intro';
      recordOnly('Q3完了（ルートC選択）');
      typing(); await wait(900); rmTyping();
      // コエルワ紹介テキスト（コエルワ側で差し替え予定）
      addMsg('コエルワは、北海道を拠点に「子どもたちの可能性を拡げる」をミッションとして、自治体・学校・企業と連携した教育事業を展開しています。\n\n放課後・長期休暇の居場所づくり（まなび場事業）や、アントレプレナーシップ教育プログラム（ミラスキ）など、地域の教育課題に取り組んでいます。');
      await wait(500);
      typing(); await wait(500); rmTyping();
      addMsg(`コエルワの公式ウェブサイトでは、各事業の詳細や実績をご覧いただけます。\nぜひあわせてご覧ください。\n🔗 ${CFG.HP_URL}`);
      await wait(600);
      typing(); await wait(600); rmTyping();
      addMsg('いかがでしたでしょうか？よろしければ、引き続きお聞かせください。');
      showQR([
        'A. 気になっている事業・プログラムが具体的にある',
        'B. コエルワとどんな連携ができるか知りたい',
        'D. ありがとうございました、これで終わります',
      ]);
      step = 'rC_reselect';
    }
    return;
  }

  // ── ルートC 再選択 ──
  if (step === 'rC_reselect') {
    if (choice.startsWith('A.')) {
      user.route = 'C→A';
      step = 'rA_q4';
      recordOnly('ルートC→A再選択');
      typing(); await wait(700); rmTyping();
      addMsg('ありがとうございます。気になっている事業・プログラムを教えていただけますか？');
      const bizNames = CFG.BUSINESSES[user.affiliationType]?.map(b => b.name) || ['その他'];
      showQR(bizNames);
    } else if (choice.startsWith('B.')) {
      user.route = 'C→B';
      step = 'rB_q4';
      recordOnly('ルートC→B再選択');
      typing(); await wait(700); rmTyping();
      addMsg('ありがとうございます。コエルワとの連携を考えるにあたって、現在どのようなことをお考えでしょうか？');
      const issues = CFG.ISSUES[user.affiliationType] || ['その他'];
      showQR(issues);
    } else if (choice.startsWith('D.')) {
      notifySlack('ルートC完了（D選択・終了）');
      typing(); await wait(600); rmTyping();
      const name = getFirstName();
      addMsg(`${name}さん、ありがとうございました！\nまたいつでもお気軽にお問い合わせください。コエルワのウェブサイトも引き続きご覧いただけますと幸いです。`);
      step = 'done';
    }
    return;
  }

  // ── ルートA: Q4 事業選択 ──
  if (step === 'rA_q4') {
    user.business = choice;
    const bizObj = CFG.BUSINESSES[user.affiliationType]?.find(b => b.name === choice);
    step = 'rA_q5';
    recordOnly('ルートA Q4完了（事業選択）', { business: choice });
    typing(); await wait(700); rmTyping();
    // 事業ページカードを表示
    if (bizObj && bizObj.url) {
      addPageCard(bizObj);
    }
    await wait(300);
    addMsg(`「${choice}」についての詳細はカードからご覧いただけます。\n現在、${choice}についてどの程度ご検討されていますか？`);
    showQR(CFG.STAGES);
    return;
  }

  // ── ルートB: Q4 課題選択 ──
  if (step === 'rB_q4') {
    user.issue = choice;
    step = 'rB_free';
    recordOnly('ルートB Q4完了（課題選択）', { issue: choice });
    typing(); await wait(700); rmTyping();
    addMsg('ありがとうございます。もう少し詳しく教えていただけますか？\nお困りのことや、気になっていること・知りたいことなど、自由にお書きください。');
    enableInput('自由にお書きください（必須）');
    return;
  }

  // ── Q5: 検討状況（A・B共通） ──
  if (step === 'rA_q5') {
    user.stage = choice;
    step = 'rA_q6';
    recordOnly('Q5完了（検討状況）', { business: user.business, issue: user.issue, stage: choice });
    typing(); await wait(700); rmTyping();
    let msg = '';
    if (choice === 'まだ情報収集の段階です') {
      msg = 'ありがとうございます。何かお役に立てることがあれば嬉しいです。よろしければ、今後のご希望をお聞かせいただけますか？';
    } else if (choice === '具体的に検討を始めています') {
      msg = 'ありがとうございます。ぜひ一緒に考えさせてください。よろしければ、今後のご希望をお聞かせいただけますか？';
    } else {
      msg = 'ありがとうございます。ぜひお力になりたいと思います。よろしければ、今後のご希望をお聞かせいただけますか？';
    }
    addMsg(msg);
    showQR(CFG.HOPES);
    return;
  }

  // ── Q6: 今後のご希望（A・B共通） ──
  if (step === 'rA_q6') {
    user.hope = choice;
    if (choice === '特に希望はありません') {
      // メール不要→完了
      notifySlack('Q6完了・完了（希望なし）', { stage: user.stage, hope: choice });
      step = 'done';
      typing(); await wait(700); rmTyping();
      const name = getFirstName();
      addMsg(`${name}さん、ありがとうございました！\nまたいつでもお気軽にお問い合わせください。コエルワのウェブサイトも引き続きご覧いただけますと幸いです。`);
    } else {
      // メールアドレスを聞く
      step = 'rA_q7';
      recordOnly('Q6完了（ご希望あり）', { stage: user.stage, hope: choice });
      typing(); await wait(700); rmTyping();
      addMsg('ありがとうございます。ご連絡先のメールアドレスを教えていただけますか？');
      enableInput('例：taro@example.com');
    }
    return;
  }
}

// ─── テキスト送信ハンドラ ───
async function send() {
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = 'auto';
  snd.disabled = true;
  addMsg(text, 'user');

  // ── Q2: 所属名・氏名 ──
  if (step === 'q2') {
    user.nameAffil = text;
    step = 'q3';
    notifySlack('Q2完了（所属名・氏名）');
    disableInput();
    const name = getFirstName();
    typing(); await wait(700); rmTyping();
    addMsg(`${name}さん、ありがとうございます。\nコエルワの事業について、現時点でどの程度ご存知でしょうか？`);
    showQR([
      'A. 気になっている事業・プログラムが具体的にある',
      'B. 詳しくはわからないが、一緒にできることを探したい',
      'C. コエルワの事業をまだよく知らないので、まず知りたい',
    ]);
    return;
  }

  // ── ルートB: フリーワード入力 ──
  if (step === 'rB_free') {
    user.freeword = text;
    step = 'rA_q5'; // Q5へ（B・A共通）
    recordOnly('ルートB フリーワード完了', { issue: user.issue, freeword: text });
    disableInput();
    typing(); await wait(800); rmTyping();
    // TODO: 課題×事業対応表に基づく事業カード表示（現在はプレースホルダー）
    addMsg('ありがとうございます。コエルワでは、いただいた内容に対応した事業に取り組んでいます。\n担当者より詳しいご案内をお送りします。');
    await wait(400);
    addMsg('現在、どの程度ご検討されていますか？');
    showQR(CFG.STAGES);
    return;
  }

  // ── Q7: メールアドレス ──
  if (step === 'rA_q7') {
    if (!isEmail(text)) {
      addMsg('メールアドレスの形式が正しくないようです。もう一度ご入力ください。');
      enableInput('例：taro@example.com');
      return;
    }
    user.email = text;
    step = 'done';
    disableInput();
    notifySlack('完了（メールアドレス取得）', {
      business:  user.business,
      issue:     user.issue,
      freeword:  user.freeword,
      stage:     user.stage,
      hope:      user.hope,
      email:     text,
    });
    typing(); await wait(700); rmTyping();
    const name = getFirstName();
    addMsg(`${name}さん、ありがとうございました！\nご入力いただいた内容を確認のうえ、担当者より順次ご連絡いたします。引き続きコエルワのウェブサイトもぜひご覧ください。`);
    return;
  }
}
</script>
